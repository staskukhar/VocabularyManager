name: vocabulary-manager

services:
  db:
    image: postgres:16-alpine
    container_name: vocabulary_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vocabulary_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: vocabulary_api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__VocabularyDbConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "${API_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vocabulary_network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: vocabulary_client
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - api
    networks:
      - vocabulary_network

volumes:
  postgres_data:

networks:
  vocabulary_network:
    driver: bridge
