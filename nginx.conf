server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|wasm|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|dat)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
